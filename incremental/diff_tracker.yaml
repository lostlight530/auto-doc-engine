tracker:
  enabled: true
  storage: incremental/diff_tracker.yaml
  max_history: 100
hashing:
  algorithm: sha256
  length: 16
  include_children: false
incremental:
  full_regenerate_threshold: 50
  preserve_metadata: true
change_types:
- id: add
  name: 新增
  description: 新节点不存在于旧版本
- id: modify
  name: 修改
  description: 节点内容发生变化
- id: delete
  name: 删除
  description: 旧节点在新版本中不存在
- id: unchanged
  name: 未变
  description: 节点内容未发生变化
- id: move
  name: 移动
  description: 节点位置发生变化（内容未变）
notifications:
  on_major_change: true
  major_change_threshold: 5
